<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Untitled</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="container">
  <h1>📋 Подготовка тендерных заявок</h1>

  <!-- Карточка добавления -->
  <div class="card">
    <h3>➕ Добавить заявку</h3>
    <div class="form-grid">
      <div class="field">
        <label>Номер извещения</label>
        <input type="text" id="noticeNumber" placeholder="0348300000125...">
      </div>
      <div class="field">
        <label>Организация</label>
        <input type="text" id="company" placeholder="ООО «ТехноСтрой»">
      </div>
      <div class="field">
        <label>НМЦК (₽)</label>
        <input type="number" id="nmck" placeholder="0" step="1">
      </div>
      <div class="field">
        <label>Статус</label>
        <select id="status">
          <option value="На проверке">На проверке</option>
          <option value="Согласована">Согласована</option>
          <option value="Отклонена">Отклонена</option>
        </select>
      </div>
      <div class="field">
        <label>Срок подачи</label>
        <input type="date" id="deadline">
      </div>
      <div class="field">
        <button id="addBtn">➕ Выполнить</button>
      </div>
    </div>
  </div>

  <!-- Карточка со списком -->
  <div class="card">
    <h3>📋 Текущие заявки</h3>
    <div class="table-wrapper">
      <table id="bidsTable">
        <thead>
          <tr>
            <th>Номер извещения</th>
            <th>Организация</th>
            <th>НМЦК (₽)</th>
            <th>Статус</th>
            <th>Срок подачи</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="bidsBody">
          <tr class="empty-row">
            <td colspan="6">Нет добавленных заявок</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
    <script  src="./script.js"></script>

  </body>
  
</html>
