<div class="container">
  <h1>📋 Подготовка тендерной заявки</h1>

  <div class="form">
    <input type="text" id="notice" placeholder="Номер извещения">
    <input type="text" id="company" placeholder="Организация">
    <input type="number" id="nmck" placeholder="НМЦК">
    <input type="date" id="deadline">
    <select id="status">
      <option>На проверке</option>
      <option>Согласована</option>
      <option>Отклонена</option>
    </select>

    <div>
      <input type="file" id="files" multiple>
      <span id="fileCount" style="margin-left: 10px;">Файлов: 0</span>
    </div>

    <button id="addBtn">➕ Добавить</button>
  </div>

  <h3>Текущие заявки</h3>
  <table id="bidsTable">
    <thead>
      <tr>
        <th>Номер извещения</th>
        <th>Организация</th>
        <th>НМЦК (₽)</th>
        <th>Файлы</th>
        <th>Статус</th>
        <th>Срок подачи</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody id="bidsBody">
      <tr><td colspan="7">Нет добавленных заявок</td></tr>
    </tbody>
  </table>
</div>
